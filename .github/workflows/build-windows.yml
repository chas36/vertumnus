name: Build Windows

on:
  workflow_dispatch:
  push:
    paths:
      - "main.py"
      - "core/**"
      - "models/**"
      - "ui/**"
      - "tests/**"
      - "requirements.txt"
      - "build.spec"
      - "assets/ffmpeg/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          New-Item -ItemType Directory -Force -Path "assets/ffmpeg" | Out-Null
          $ffmpeg = (Get-Command ffmpeg).Source
          $ffprobe = (Get-Command ffprobe).Source
          Copy-Item $ffmpeg "assets/ffmpeg/ffmpeg.exe" -Force
          Copy-Item $ffprobe "assets/ffmpeg/ffprobe.exe" -Force

      - name: Validate FFmpeg assets
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/ffmpeg/ffmpeg.exe")) { throw "Missing assets/ffmpeg/ffmpeg.exe" }
          if (-not (Test-Path "assets/ffmpeg/ffprobe.exe")) { throw "Missing assets/ffmpeg/ffprobe.exe" }

      - name: Run tests
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v

      - name: Build exe
        shell: pwsh
        run: |
          python -m PyInstaller build.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MP4Converter-windows
          path: dist/MP4Converter.exe
